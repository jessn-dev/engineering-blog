name: Generate Weekly Blog Posts

on:
  schedule:
    # Runs at 13:00 UTC (8:00 AM Central Time) on Tuesday (2), Thursday (4), Saturday (6), and Sunday (0)
    - cron: '0 13 * * 2'
    - cron: '0 13 * * 3'
    - cron: '0 13 * * 4'
    - cron: '0 13 * * 6'
    - cron: '0 13 * * 0'
  workflow_dispatch:
    inputs:
      persona:
        description: 'Persona to use'
        required: false
        default: 'journalist'
        type: choice
        options:
          - technical-writer
          - content-writer
          - journalist
          - book-reviewer
          - faang-analyst

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Determine Persona and Generate Post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          # If triggered manually, use the input persona
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            PERSONA="${{ github.event.inputs.persona }}"
          else
            # Otherwise determine by the day of the week
            DAY=$(date +%w)
            if [ "$DAY" -eq 2 ]; then
              PERSONA="technical-writer"
            elif [ "$DAY" -eq 3 ]; then
              PERSONA="faang-analyst"
            elif [ "$DAY" -eq 4 ]; then
              PERSONA="content-writer"
            elif [ "$DAY" -eq 6 ]; then
              PERSONA="book-reviewer"
            else
              PERSONA="journalist"
            fi
          fi
          
          echo "Running generator for persona: $PERSONA"
          node generate-post.js $PERSONA

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/
          git commit -m "chore: auto-generate new blog post for $PERSONA persona" || echo "No changes to commit"
          git push
